Screens:
  EmergencyRequestScreen:
    Properties:
      Fill: =RGBA(249, 251, 251, 1)
    Children:
      - imgHelpIcon:
          Control: Image@2.2.3
          Properties:
            Height: =354
            Image: ='Screenshot 2026-05-06 at 8.12.46 PM'
            Width: =518
            X: =61
            Y: =590
      - btnSendHelp:
          Control: ModernButton@1.0.0
          Properties:
            Appearance: =ButtonAppearance.Transparent
            BasePaletteColor: =RGBA(216, 0, 39, 1)
            BorderColor: =RGBA(150, 0, 20, 1)
            BorderStyle: =BorderStyle.None
            BorderThickness: =2
            Color: =RGBA(255, 255, 255, 1)
            Height: =342
            OnSelect: =Navigate(EmergencyConfirmationScreen,ScreenTransition.Fade)
            RadiusBottomLeft: =20
            RadiusBottomRight: =20
            RadiusTopLeft: =20
            RadiusTopRight: =20
            Text: =
            Width: =518
            X: =66
            Y: =602
      - imgEmergencyShield:
          Control: Image@2.2.3
          Properties:
            Height: =184
            Image: ='Screenshot 2026-05-06 at 8.26.09 PM'
            Width: =176
            X: =232
            Y: =24
      - icoLocation:
          Control: Image@2.2.3
          Properties:
            Height: =144
            Image: ='Screenshot 2026-05-06 at 8.27.11 PM'
            Width: =640
            Y: =358
      - lblEmergencyTitle:
          Control: ModernText@1.0.0
          Properties:
            Font: =Font.'Open Sans'
            FontWeight: =FontWeight.Bold
            Height: =62
            Size: =32
            Text: ="Fire Brigade Alerts"
            Width: =308
            X: =171
            Y: =208
      - lblEmergencySubtitle:
          Control: ModernText@1.0.0
          Properties:
            Font: =Font.'Open Sans'
            FontWeight: =FontWeight.Lighter
            Height: =64
            Text: ="Emergency Response System"
            Width: =436
            X: =148
            Y: =270
