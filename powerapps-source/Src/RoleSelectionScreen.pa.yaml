Screens:
  RoleSelectionScreen:
    Properties:
      Fill: =RGBA(249, 251, 251, 1)
    Children:
      - conRoleButtons:
          Control: GroupContainer@1.5.0
          Variant: GridLayout
          Properties:
            Height: =350
            LayoutGap: =15
            LayoutGridColumns: =1
            Width: =531
            X: =55
            Y: =400
          Children:
            - btnSelectCivilian:
                Control: ModernButton@1.0.0
                Properties:
                  BasePaletteColor: =RGBA(255, 0, 38, 1)
                  OnSelect: =Navigate(EmergencyRequestScreen,ScreenTransition.Fade)
                  Text: ="Civilian"
                  X: =40
                  Y: =40
            - btnSelectResponder:
                Control: ModernButton@1.0.0
                Properties:
                  BasePaletteColor: =RGBA(255, 0, 38, 1)
                  OnSelect: =Navigate(ResponderLoginScreen,ScreenTransition.Fade)
                  Text: ="Responder"
                  X: =16
                  Y: =28
      - lblRoleTitle:
          Control: ModernText@1.0.0
          Properties:
            FontWeight: =FontWeight.Bold
            Height: =139
            Size: =48
            Text: ="Volunteer Fire Brigade"
            Width: =520
            X: =66
            Y: =67
