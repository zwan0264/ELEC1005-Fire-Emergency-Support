Screens:
  ResponderSignupScreen:
    Children:
      - txtSignupUsername:
          Control: ModernTextInput@1.1.0
          Properties:
            Placeholder: ="Enter Username"
            X: =43
            Y: =296
      - txtSignupEmail:
          Control: ModernTextInput@1.1.0
          Properties:
            Placeholder: ="Enter Email"
            X: =43
            Y: =430
      - txtSignupPassword:
          Control: ModernTextInput@1.1.0
          Properties:
            Placeholder: ="Enter Password"
            Type: =TextInputType.Password
            X: =42
            Y: =549
      - txtSignupFirstName:
          Control: ModernTextInput@1.1.0
          Properties:
            Placeholder: ="Enter First Name"
            X: =43
            Y: =669
      - txtSignupStation:
          Control: ModernTextInput@1.1.0
          Properties:
            X: =43
            Y: =810
      - lblSignupHeader:
          Control: ModernText@1.0.0
          Properties:
            Color: =RGBA(0, 0, 0, 1)
            Height: =102
            Size: =42
            Text: ="Sign Up Page"
            Width: =326
            X: =180
            Y: =125
      - lblSignupUsername:
          Control: ModernText@1.0.0
          Properties:
            Text: ="Enter Username :"
            Width: =222
            X: =41
            Y: =246
      - lblSignupEmail:
          Control: ModernText@1.0.0
          Properties:
            Text: ="Enter Email :"
            X: =44
            Y: =380
      - lblSignupPassword:
          Control: ModernText@1.0.0
          Properties:
            Text: ="Enter Password :"
            X: =40
            Y: =499
      - lblSignupFirstName:
          Control: ModernText@1.0.0
          Properties:
            Text: ="Enter First Name :"
            Width: =246
            X: =42
            Y: =619
      - lblSignupStation:
          Control: ModernText@1.0.0
          Properties:
            Text: ="Enter Station Name :"
            Width: =246
            X: =43
            Y: =760
      - btnCreateResponderAccount:
          Control: ModernButton@1.0.0
          Properties:
            BasePaletteColor: =RGBA(184, 0, 0, 1)
            OnSelect: |-
              =If(
                  IsBlank(txtSignupUsername.Text) ||
                  IsBlank(txtSignupEmail.Text) ||
                  IsBlank(txtSignupPassword.Text) ||
                  IsBlank(txtSignupFirstName.Text) ||
                  IsBlank(txtSignupStation.Text),

                  Notify("Please complete all fields.", NotificationType.Error),

                  If(
                      !IsBlank(LookUp(ResponderDetails, Username = txtSignupUsername.Text)),
                      Notify("Username already exists.", NotificationType.Error),

                      If(
                          !IsBlank(LookUp(ResponderDetails, Email = txtSignupEmail.Text)),
                          Notify("Email already exists.", NotificationType.Error),

                          Patch(
                              ResponderDetails,
                              Defaults(ResponderDetails),
                              {
                                  Username: txtSignupUsername.Text,
                                  Email: txtSignupEmail.Text,
                                  Password: txtSignupPassword.Text,
                                  FirstName: txtSignupFirstName.Text,
                                  StationName: txtSignupStation.Text
                              }
                          );

                          Notify("Account created successfully!", NotificationType.Success);
                          Navigate(SignUpSuccessScreen, ScreenTransition.Fade)
                      )
                  )
              )
            Text: ="Sign Up"
            X: =164
            Y: =924
      - btnSignupBack:
          Control: ModernButton@1.0.0
          Properties:
            BasePaletteColor: =RGBA(252, 0, 38, 1)
            Height: =62
            Icon: ="ArrowLeft"
            OnSelect: =Navigate(ResponderLoginScreen, ScreenTransition.Fade)
            Text: ="Back"
            Width: =200
            X: =33
            Y: =53
