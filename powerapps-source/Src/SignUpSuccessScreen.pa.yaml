Screens:
  SignUpSuccessScreen:
    Children:
      - tmrSignupSuccess:
          Control: Timer@2.1.0
          Properties:
            AutoPause: =false
            AutoStart: =true
            Duration: =1000
            OnTimerEnd: =Navigate(ResponderLoginScreen,ScreenTransition.Fade)
            Visible: =false
            X: =180
            Y: =40
      - icoSignupSuccessCircle:
          Control: Circle@2.3.0
          Properties:
            Fill: =Color.Red
            X: =Parent.Width/2 - Self.Width/2
            Y: =(Parent.Height/2 - Self.Height/2) * .7
      - icoSignupSuccessCheck:
          Control: Classic/Icon@2.5.0
          Properties:
            Color: =RGBA(255, 255, 255, 1)
            Height: =icoSignupSuccessCircle.Height
            Icon: =Icon.Check
            PaddingBottom: =Self.PaddingTop
            PaddingLeft: =Self.PaddingTop
            PaddingRight: =Self.PaddingTop
            PaddingTop: =18
            PressedFill: =RGBA(255, 255, 255, 0.3)
            Width: =icoSignupSuccessCircle.Width
            X: =Parent.Width/2 - Self.Width/2
            Y: =(Parent.Height/2 - Self.Height/2) * .7
      - lblSignupSuccessMessage:
          Control: Label@2.5.1
          Properties:
            Align: =Align.Center
            AutoHeight: =true
            Height: =icoSignupSuccessCircle.Height
            Text: ="Sign Up Sucessful!"
            Width: =Parent.Width * 0.75
            X: =Parent.Width/2 - Self.Width/2
            Y: =icoSignupSuccessCheck.Y + icoSignupSuccessCheck.Height + 100
