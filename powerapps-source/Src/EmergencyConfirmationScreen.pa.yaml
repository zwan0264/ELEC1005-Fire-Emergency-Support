Screens:
  EmergencyConfirmationScreen:
    Properties:
      Fill: =RGBA(249, 251, 251, 1)
      OnVisible: |-
        =Set(
            varGPSCaptured,
            !IsBlank(Location.Latitude) && !IsBlank(Location.Longitude)
        );

        Set(
            varLocationText,
            If(
                varGPSCaptured,
                Text(Location.Latitude, "[$-en-US]0.000000") & ", " & Text(Location.Longitude, "[$-en-US]0.000000"),
                "Location not captured. Please enable location services."
            )
        )
    Children:
      - rectConfirmHeader:
          Control: Rectangle@2.3.0
          Properties:
            Fill: =RGBA(184, 0, 0, 1)
            Height: =198
            Width: =640
      - lblConfirmHeader:
          Control: ModernText@1.0.0
          Properties:
            Color: =RGBA(255, 255, 255, 1)
            FontWeight: =FontWeight.Bold
            Height: =102
            Size: =42
            Text: ="Confirm Emergency Request"
            Width: =574
            X: =33
            Y: =22
      - icoConfirmCircle:
          Control: Circle@2.3.0
          Properties:
            Fill: =RGBA(184, 0, 0, 1)
            Height: =150
            Width: =150
            X: =245
            Y: =232
      - icoConfirmAlert:
          Control: ModernIcon@1.1.0
          Properties:
            Height: =75
            Icon: ="ErrorCircle"
            IconColor: =RGBA(255, 255, 255, 1)
            Width: =75
            X: =282
            Y: =269
      - lblConfirmTitle:
          Control: ModernText@1.0.0
          Properties:
            Color: =RGBA(0, 0, 0, 1)
            FontWeight: =FontWeight.Bold
            Height: =102
            Size: =42
            Text: ="Confirm Request"
            Width: =362
            X: =139
            Y: =382
      - lblConfirmSubtext:
          Control: ModernText@1.0.0
          Properties:
            Height: =78
            Text: ="Tap confirm to send request immediately"
            Width: =492
            X: =99
            Y: =453
      - btnConfirmEmergency:
          Control: ModernButton@1.0.0
          Properties:
            BasePaletteColor: =RGBA(184, 0, 0, 1)
            DisplayMode: |-
              =If(
                  IsBlank(ddlIncidentType.Selected.Value),
                  DisplayMode.Disabled,
                  DisplayMode.Edit
              )
            Height: =90
            OnSelect: |-
              =Set(
                  varGPSCaptured,
                  !IsBlank(Location.Latitude) && !IsBlank(Location.Longitude)
              );

              Set(
                  varIncidentLocation,
                  If(
                      varGPSCaptured,
                      Text(Location.Latitude, "[$-en-US]0.000000") & ", " & Text(Location.Longitude, "[$-en-US]0.000000"),
                      "Location not captured"
                  )
              );

              Set(
                  varIncidentID,
                  "INC-" & Text(Now(), "yyyymmddhhmmss")
              );

              IfError(
                  Set(
                      varSelectedIncident,
                      Patch(
                          EmergencyIncidents,
                          Defaults(EmergencyIncidents),
                          {
                              Title: varIncidentID,
                              'Incident ID': varIncidentID,
                              Location: varIncidentLocation,
                              'Reporter Email': User().Email,
                              Status: {Value: "New"},
                              'Created Time': Now(),
                              'Last Updated': Now(),
                              'GPS Status': {Value: If(varGPSCaptured, "Captured", "Not Captured")},
                              'Reports From Same Reporter': CountRows(
                                  Filter(
                                      EmergencyIncidents,
                                      'Reporter Email' = User().Email
                                  )
                              ) + 1,
                              'Incident Type': {Value: ddlIncidentType.Selected.Value},
                              'Support Requested': false
                          }
                      )
                  );

                  Refresh(EmergencyIncidents);

                  Navigate(EmergencyStatusScreen, ScreenTransition.Fade),

                  Notify(
                      "Incident was not saved: " & FirstError.Message,
                      NotificationType.Error
                  )
              )
            Text: ="Confirm"
            Width: =558
            X: =33
            Y: =840
      - rectLocationBox:
          Control: Rectangle@2.3.0
          Properties:
            BorderColor: =Color.Black
            BorderThickness: =0.2
            Fill: =Color.White
            Height: =116
            Width: =558
            X: =33
            Y: =560
      - lblCurrentLocationTitle:
          Control: ModernText@1.0.0
          Properties:
            Height: =52
            Text: |-
              ="Current Location: "
            Width: =595
            X: =45
            Y: =560
      - icoLocationGlobe:
          Control: ModernIcon@1.1.0
          Properties:
            Icon: ="Globe"
            X: =57
            Y: =612
      - lblCurrentCoordinates:
          Control: ModernText@1.0.0
          Properties:
            Height: =80
            Text: |-
              = If(
                  !IsBlank(Location.Latitude) && !IsBlank(Location.Longitude),
                  Text(Location.Latitude, "[$-en-US]0.000000") & ", " & Text(Location.Longitude, "[$-en-US]0.000000"),
                  "Location not captured. Please enable location services."
              )
            Width: =414
            X: =113
            Y: =593
      - ddlIncidentType:
          Control: ModernDropdown@1.0.0
          Properties:
            Appearance: =Appearance.Outline
            BasePaletteColor: =RGBA(189, 178, 176, 1)
            BorderColor: =RGBA(0, 0, 0, 1)
            BorderStyle: =BorderStyle.Solid
            BorderThickness: =1
            Color: =RGBA(0, 0, 0, 1)
            Height: =68
            ItemDisplayText: =ThisItem.Value
            Items: =Choices(EmergencyIncidents.'Incident Type')
            Width: =558
            X: =33
            Y: =724
