Screens:
  IncidentOverviewScreen:
    Children:
      - rectOverviewHeader:
          Control: Rectangle@2.3.0
          Properties:
            Fill: =Color.Red
            Height: =149
            Width: =640
      - galIncidentOverview:
          Control: Gallery@2.15.0
          Variant: BrowseLayout_Vertical_TwoTextOneImageVariant_ver5.0
          Properties:
            Height: =982
            Items: |-
              =SortByColumns(
                  AddColumns(
                      Filter(
                          EmergencyIncidents,
                          Status.Value = "New" || Status.Value = "On the Way"
                      ),
                      StatusRank,
                      If(
                          Status.Value = "New",
                          1,
                          2
                      ),
                      TimeRank,
                      Coalesce('Last Updated', 'Created Time')
                  ),
                  "StatusRank",
                  SortOrder.Ascending,
                  "TimeRank",
                  SortOrder.Descending,
                  "ID",
                  SortOrder.Descending
              )
            TemplatePadding: =50
            TemplateSize: =200
            Y: =149
          Children:
            - lblOverviewIncidentTitle:
                Control: Label@2.5.1
                Properties:
                  BorderColor: =RGBA(0, 0, 0, 1)
                  Color: =RGBA(50, 49, 48, 1)
                  FontWeight: =If(ThisItem.IsSelected, FontWeight.Semibold, FontWeight.Normal)
                  Height: =30
                  OnSelect: =Select(Parent)
                  PaddingBottom: =0
                  PaddingLeft: =0
                  PaddingRight: =0
                  PaddingTop: =0
                  Size: =14
                  Text: =ThisItem.Location
                  VerticalAlign: =VerticalAlign.Top
                  Width: =Parent.TemplateWidth - 173
                  X: =20
                  Y: |
                    =20
            - sepOverviewIncidentCard:
                Control: Rectangle@2.3.0
                Properties:
                  Fill: =RGBA(255, 255, 255, 1)
                  Height: =8
                  OnSelect: =Select(Parent)
                  Width: =Parent.TemplateWidth
                  Y: =Parent.TemplateHeight - Self.Height
            - rectOverviewIncidentCard:
                Control: Rectangle@2.3.0
                Properties:
                  BorderColor: =RGBA(80, 80, 80, 1)
                  BorderThickness: =2
                  Fill: =Color.White
                  Height: =200
                  OnSelect: =Select(Parent)
                  Width: =539
                  X: =1
            - lblOverviewIncidentId:
                Control: ModernText@1.0.0
                Properties:
                  Height: =66
                  OnSelect: =Select(Parent)
                  Text: |-
                    ="Incident: " & ThisItem.'Incident ID'
                  Width: =437
                  X: =20
                  Y: =10
            - lblOverviewStatus:
                Control: ModernText@1.0.0
                Properties:
                  Height: =48
                  OnSelect: =Select(Parent)
                  Text: |-
                    ="Status: " & ThisItem.Status.Value
                  Width: =367
                  X: =20
                  Y: =85
            - lblOverviewUpdated:
                Control: ModernText@1.0.0
                Properties:
                  OnSelect: =Select(Parent)
                  Text: |-
                    ="Updated: " & Text(
                        Coalesce(ThisItem.'Last Updated', ThisItem.'Created Time'),
                        "[$-en-US]h:mm AM/PM"
                    )
                  Width: =272
                  X: =20
                  Y: =142
            - btnOverviewView:
                Control: ModernButton@1.0.0
                Properties:
                  BasePaletteColor: =RGBA(255, 66, 66, 1)
                  Color: =RGBA(255, 255, 255, 1)
                  Height: =61
                  OnSelect: |-
                    =Set(
                        varSelectedIncident,
                        LookUp(EmergencyIncidents, ID = ThisItem.ID)
                    );

                    If(
                        ThisItem.Status.Value = "On the Way",
                        Navigate(DispatchTrackingScreen, ScreenTransition.Fade),
                        Navigate(ActiveIncidentScreen, ScreenTransition.Fade)
                    )
                  RadiusBottomLeft: =10
                  RadiusBottomRight: =10
                  RadiusTopLeft: =10
                  RadiusTopRight: =10
                  Text: ="View"
                  Width: =201
                  X: =306
                  Y: =90
      - lblOverviewHeader:
          Control: ModernText@1.0.0
          Properties:
            Color: =RGBA(255, 255, 255, 1)
            Font: =Font.'Lato Black'
            Height: =78
            Size: =33
            Text: ="Incident Detail"
            Width: =246
            X: =197
            Y: =35
      - btnOverviewRefresh:
          Control: ModernButton@1.0.0
          Properties:
            Appearance: =ButtonAppearance.Transparent
            BasePaletteColor: =RGBA(245, 0, 0, 1)
            Color: =RGBA(255, 255, 255, 1)
            Font: ="30"
            Height: =122
            OnSelect: |-
              =Refresh(EmergencyIncidents);
              Reset(galIncidentOverview);
              Notify("Incident list refreshed.", NotificationType.Success)
            Text: ="↻ Refresh"
            Width: =173
      - lblNoActiveIncidents:
          Control: ModernText@1.0.0
          Properties:
            Align: =Align.Center
            FontWeight: =FontWeight.Bold
            Height: =150
            Size: =40
            Text: ="No active incidents at the moment."
            Visible: =IsEmpty(galIncidentOverview.AllItems)
            Width: =Parent.Width - 10
            X: =10
            Y: =544
